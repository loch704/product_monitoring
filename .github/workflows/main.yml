name: LastChanceToy Monitor

permissions:
  contents: write

on:
  schedule:
    # 每5分鐘執行一次
    - cron: '*/5 * * * *'
  workflow_dispatch:

jobs:
  monitor:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install Dependencies
        run: |
          pip install requests beautifulsoup4

      - name: Run Monitor
        #env:
        #  BOT_TOKEN: ${{ secrets.BOT_TOKEN }}
        #  CHAT_ID: ${{ secrets.CHAT_ID }}
        run: |
          python monitor.py

      - name: Commit Changes
        run: |
          git config --global user.name "github-actions"
          git config --global user.email "github-actions@github.com"
          git add notified_products.txt
          git diff --staged --quiet || git commit -m "Update notified products"
          git push
